<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 移动端遮罩层 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 顶部导航栏（移动端） -->
    <header class="mobile-header" id="mobileHeader">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <span class="mobile-title" id="mobileTitle">博客</span>
        <span style="width: 40px;"></span>
    </header>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="blog-title" id="blogTitle">📝 我的博客</h1>
            <p class="blog-desc" id="blogDesc">记录学习与思考</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input
            type="text"
            id="searchInput"
            placeholder="搜索文章..."
            autocomplete="off"
            />
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </div>

        <!-- 导航列表 -->
        <nav class="nav-list" id="navList">
            <div class="nav-section">
                <div class="nav-section-title">🏠 导航</div>
                <a class="nav-item home-link" data-path="/home" data-type="home" href="/home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    首页
                </a>
            </div>
            <div class="nav-section" id="pageSection">
                <div class="nav-section-title">📄 文章</div>
                <div id="pageNavItems"></div>
            </div>
            <div class="nav-section" id="docsSection">
                <div class="nav-section-title">📚 文档</div>
                <div id="docsNavItems"></div>
            </div>
        </nav>

        <!-- 侧栏底部 -->
        <div class="sidebar-footer">
            <span class="footer-text">Powered by GitHub Pages</span>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">
        <div class="content-container" id="contentContainer">
            <!-- 文章内容将由 JS 动态渲染 -->
        </div>
    </main>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <script src="./app.js"></script>
</body>
</html>
